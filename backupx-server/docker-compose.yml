services:
  backup-ui:
    build: .
    container_name: backup-ui
    restart: unless-stopped
    ports:
      - "8088:5000"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - backup-data:/app/data
      # Mount SSH keys for remote access (to non-root user's home)
      - ~/.ssh:/home/backupx/.ssh:ro
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
      # PostgreSQL configuration
      - DATABASE_TYPE=postgresql
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=backupx
      - DATABASE_USER=backupx
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-backupx-secure-password}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: backup-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=backupx
      - POSTGRES_USER=backupx
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-backupx-secure-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backupx -d backupx"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backup-data:
  postgres-data:
